experiment:
  name: mvp_live_baseline
  input_source: live_camera
  scenario: indoor_corridor
  duration_seconds: 30

pipeline:
  camera:
    resolution: "1080p"
    fps: 30

  imagemanip:
    resize_mode: "letterbox"
    output_size: [512, 384]

  nn:
    type: "detection"
    model_name: "yolov6n"
    confidence_threshold: 0.35

  tracker:
    enabled: true

outputs:
  live_view: true
  save_video: true
  save_metrics: true
  save_events: true